name = "roam-mcp"
main = "src/index.ts"
compatibility_date = "2024-11-05"

# 그래프 이름과 토큰은 secret으로 주입하거나, 매 요청마다 헤더로 덮어쓸 수 있음.
# (기본값으로 특정 그래프 이름을 박아두지 않는다 — 누락 시 호출이 에러로 거부됨.)
#
# secret으로 주입하려면:
#   npx wrangler secret put ROAM_GRAPH_NAME
#   npx wrangler secret put ROAM_API_TOKEN
#
# 헤더로 덮어쓰려면:
#   X-Roam-Graph:  <graph-name>
#   X-Roam-Token:  <roam-graph-token-...>      (또는 Authorization: Bearer ...)
#   X-Roam-Ai-Tag: false                        (생략 시 ON; 끄려면 false/0/off/no)
